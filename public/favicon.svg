<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
  <!-- Favicon Mockiosa : plume pleine sans fond. La tige est CREUSÉE
       dans le corps (masque) pour que la silhouette reste lisible en
       16px. Noire sur onglets clairs, blanche en thème sombre. -->
  <style>
    .f { fill: #000000; stroke: #000000; }
    @media (prefers-color-scheme: dark) {
      .f { fill: #ffffff; stroke: #ffffff; }
    }
  </style>
  <mask id="shaft">
    <rect width="24" height="24" fill="#ffffff"/>
    <path d="M16 8 5.5 18.5" fill="none" stroke="#000000" stroke-width="1.7" stroke-linecap="round"/>
    <path d="M17.5 15H10" fill="none" stroke="#000000" stroke-width="1.7" stroke-linecap="round"/>
  </mask>
  <path class="f" d="M20.24 12.24a6 6 0 0 0-8.49-8.49L5 10.5V19h8.5z" stroke-width="2" stroke-linejoin="round" mask="url(#shaft)"/>
  <path class="f" d="M7 17 2 22" fill="none" stroke-width="2.4" stroke-linecap="round"/>
</svg>
