<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width" />
    <meta name="x-apple-disable-message-reformatting" />
    <meta name="color-scheme" content="dark" />
    <meta name="supported-color-schemes" content="dark light" />
    <title>Confirm your new email</title>
  </head>
  <body style="margin:0;padding:0;background:#050509;font-family:-apple-system,BlinkMacSystemFont,'Inter',Segoe UI,Roboto,sans-serif;">
    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%" style="background:#050509;">
      <tr>
        <td align="center" style="padding:48px 16px;">
          <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="520" style="max-width:520px;background:#0F0F14;border:1px solid rgba(255,255,255,0.06);border-radius:20px;overflow:hidden;">
            <tr>
              <td style="padding:32px 32px 0 32px;">
                <div style="font-size:15px;font-weight:600;color:#F5F5F7;letter-spacing:-0.01em;">Memselon Mockup</div>
              </td>
            </tr>
            <tr>
              <td style="padding:28px 32px 8px 32px;">
                <h1 style="margin:0;font-size:22px;font-weight:600;color:#F5F5F7;letter-spacing:-0.02em;line-height:1.3;">
                  Confirm your new email
                </h1>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 24px 32px;">
                <p style="margin:0;font-size:14px;line-height:1.6;color:#A8A8AD;">
                  You're updating your Memselon Mockup email to <strong style="color:#F5F5F7;">{{ .Email }}</strong>. Tap the button below to confirm.
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding:0 32px 32px 32px;">
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;padding:12px 28px;border-radius:10px;background:linear-gradient(135deg,#7F77DD,#534AB7);color:#ffffff;text-decoration:none;font-size:14px;font-weight:600;">
                  Confirm new email
                </a>
              </td>
            </tr>
            <tr>
              <td style="padding:0 32px 32px 32px;border-top:1px solid rgba(255,255,255,0.06);">
                <p style="margin:24px 0 0 0;font-size:11px;line-height:1.6;color:#48484A;">
                  If you didn't request this change, ignore this email and consider rotating your password.<br/>
                  Memselon Mockup — premium 3D mockups for Framer.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
